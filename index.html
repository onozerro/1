<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SoundCloud лайкер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, Arial, sans-serif;
            padding: 12px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .track-area {
            background: #111111;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, button {
            font-size: 16px;
            padding: 14px 18px;
        }
        #trackUrl {
            width: 100%;
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333333;
            margin-bottom: 12px;
            font-size: 14px;
        }
        #passwordInput {
            width: 100%;
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333333;
            margin-bottom: 12px;
            font-size: 14px;
        }
        #startBtn {
            width: 100%;
            background: #333333;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            padding: 14px;
            transition: 0.2s;
        }
        #startBtn:hover {
            background: #444444;
        }
        .main-panel {
            background: #000000;
        }
        .top-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
        }
        .small-btn {
            background: #1a1a1a;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #cccccc;
            border: 1px solid #333333;
            cursor: pointer;
            transition: 0.2s;
        }
        .small-btn:hover {
            background: #2a2a2a;
            color: #ffffff;
        }
        .big-btn {
            width: 100%;
            padding: 24px 16px;
            font-size: 22px;
            background: #ff5500;
            color: #ffffff;
            border: none;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .big-btn:hover {
            background: #ff7700;
        }
        .info-bar {
            background: #111111;
            padding: 12px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
        }
        .nick-box, .pass-box {
            background: #0a0a0a;
            padding: 18px 12px;
            text-align: center;
            font-size: 22px;
            font-family: 'SF Mono', 'Menlo', monospace;
            margin: 12px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: 0.1s;
            word-break: break-all;
            border: 1px solid #2a2a2a;
        }
        .nick-box {
            color: #ffffff;
            background: #0d0d0d;
        }
        .pass-box {
            color: #aaaaaa;
            background: #0a0a0a;
            font-size: 20px;
        }
        .nick-box:active, .pass-box:active {
            background: #1a1a1a;
        }
        .track-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: #222222;
            color: #ffffff;
            border: 1px solid #333333;
            cursor: pointer;
            font-weight: 500;
            margin: 12px 0;
            transition: 0.2s;
        }
        .track-btn:hover {
            background: #2a2a2a;
            border-color: #555555;
        }
        .used-btn, .reset-btn {
            padding: 12px 20px;
            font-size: 15px;
            margin: 5px;
            flex: 1;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .used-btn {
            background: #1a1a1a;
            color: #ff5555;
            border: 1px solid #ff5555;
        }
        .used-btn:hover {
            background: #2a1a1a;
        }
        .reset-btn {
            background: #1a1a1a;
            color: #cccccc;
            border: 1px solid #333333;
        }
        .reset-btn:hover {
            background: #2a2a2a;
            color: #ffffff;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }
        .recovery-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .recovery-box {
            background: #111111;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .recovery-box h3 {
            color: #ffffff;
            margin: 0 0 10px 0;
            font-weight: 500;
        }
        .generated-code {
            background: #0a0a0a;
            padding: 14px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 22px;
            letter-spacing: 3px;
            color: #ffaa44;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #2a2a2a;
        }
        .generated-code:active {
            background: #1a1a1a;
        }
        .recovery-input {
            width: 100%;
            background: #1a1a1a;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 14px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            margin: 10px 0;
        }
        .recovery-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }
        .recovery-buttons button {
            flex: 1;
            padding: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .confirm-btn {
            background: #333333;
            color: #ffffff;
        }
        .confirm-btn:hover {
            background: #444444;
        }
        .cancel-btn {
            background: #1a1a1a;
            color: #aaaaaa;
            border: 1px solid #2a2a2a;
        }
        .cancel-btn:hover {
            background: #2a2a2a;
            color: #ffffff;
        }
        .code-label {
            color: #888888;
            font-size: 11px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            border-radius: 0;
        }
        button {
            border-radius: 0;
        }
        .nick-box, .pass-box {
            border-radius: 0;
        }
        .info-bar {
            border-radius: 0;
        }
        .track-area {
            border-radius: 0;
        }
        .main-panel {
            border-radius: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="setupPanel" class="track-area">
        <input type="text" id="trackUrl" placeholder="https://soundcloud.com/.../трек">
        <input type="password" id="passwordInput" placeholder="Пароль от аккаунтов">
        <button id="startBtn">▶ СТАРТ</button>
    </div>

    <div id="mainPanel" style="display: none;">
        <div class="main-panel">
            <div class="top-buttons">
                <button id="recoveryBtn" class="small-btn">♻️ RECOVERY</button>
            </div>
            
            <button id="randomBtn" class="big-btn">СЛУЧАЙНЫЙ НИК</button>
            
            <div class="nick-box" id="nickDisplay">—</div>
            <div class="pass-box" id="passwordDisplay">••••••••</div>
            
            <button id="trackBtn" class="track-btn">🔗 НА ТРЕК</button>
            
            <div class="info-bar">
                <span>📦 ОСТАЛОСЬ: <strong id="remainCount">0</strong></span>
                <span>✅ ИСПОЛЬЗОВАНО: <strong id="usedCount">0</strong></span>
            </div>
            
            <div class="flex-buttons">
                <button id="doneBtn" class="used-btn">✓ ВЫПОЛНИЛ</button>
                <button id="resetBtn" class="reset-btn">⟳ СБРОС</button>
            </div>
        </div>
    </div>
</div>

<script>
// ========== НИКИ (старые + новые без дубликатов) ==========
const BASE_NICKS = [
    "17enttt","tanos-624602436","st0kkman","fatmandygng","prod-mandy",
    "flewed-532745435","erdmankry","reallyrich2k26","jellynest-5","totrapmusicbuth",
    "fendy1s","dorbaby","pamdtuk","yngbom","rocckset","smalepoint",
    "prso-unablor","jitqwipper","ven2kk","damfold","crowded3","proddebut","wildkant",
    "vorqqkk","barb-514332249","30mop","2realslime","b0ximgg","filgenius",
    "fantoss-483481720","slabboyst","troddennn","laseddev","willswowtfk","satmorphine",
    "drewnnnnn","fakedunkk","oxxshnta","gelandoke","2amboy","anofenkk","paurinup",
    "lendray88","supdaily","banddetro72","damncoldy","buddygrol9","strikeqq","flayzed",
    "jugg2mandy","thekr9ueger","sameder-samderrs","jaystkraylaa","c2razyy","miketlorisss",
    "kastlook9277","drango-426649390","hamzadoll","ski-dl","tomymontanaaaaaa","wtfdinny71",
    "bj3agly","2mandys3","toorealslimking","whyyalwaysmeee","2sad2care-205405600",
    "dudeneatsssssss","whot891","mdmoodl"
];

const NEW_NICKS = [
    "noahsmithhhhhh", "ilykilsss", "user-45490173", "drankkk-drank",
    "qlondys", "fuksjail", "mattcrytt", "famlimon", "bleed1ng",
    "sadface-exe-970064866", "blinkc187", "itsok2cryyyyyy",
    "madlonnn", "br0k3n-692042041", "denx0ly", "w00fled",
    "c77razy", "hahyeayeahahah", "damnanklys", "juggtoogladdy",
    "2bloody-98089138", "thrtys00", "grout-418114195", "xentavier",
    "juged-45768565", "skdout", "q9ninty", "human-994282571",
    "jugg-359870547", "lil-playstation-353013122", "tommyf1ukkk",
    "2026-953630611", "user-234347427"
];

const allUniqueNicks = [...new Set([...BASE_NICKS, ...NEW_NICKS])];

const NICKS_WITH_NUMBERS = allUniqueNicks.map((nick, index) => ({
    num: String(index + 1).padStart(3, '0'),
    nick: nick
}));

let availableNicks = [...NICKS_WITH_NUMBERS];
let usedNicks = [];
let currentNickObj = null;
let trackUrl = "";
let userPassword = "";
let sessionActive = false;
let waitingForDone = false;

function updateUI() {
    document.getElementById('remainCount').innerText = availableNicks.length;
    document.getElementById('usedCount').innerText = usedNicks.length;
}

async function copyToClipboard(text) {
    try {
        await navigator.clipboard.writeText(text);
    } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }
}

function openInBrowser(url) {
    const newWindow = window.open('about:blank', '_blank');
    if (newWindow) {
        newWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head><meta http-equiv="refresh" content="0; url=${url}"></head>
            <body style="background:#000000;color:white;text-align:center;padding:50px">⏳</body>
            </html>
        `);
        newWindow.document.close();
    } else {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

function showRecoveryModal() {
    const usedNumbers = usedNicks.map(n => n.num).sort();
    let recoveryCode = "";
    for (const num of usedNumbers) {
        recoveryCode += num;
    }
    if (recoveryCode === "") recoveryCode = "001002003";
    
    const modal = document.createElement('div');
    modal.className = 'recovery-modal';
    modal.innerHTML = `
        <div class="recovery-box">
            <h3>♻️ RECOVERY</h3>
            <div class="code-label">📋 ТВОЙ КОД (НАЖМИ → КОПИРОВАТЬ)</div>
            <div class="generated-code" id="generatedCode">${recoveryCode}</div>
            <div class="code-label">🔓 ИЛИ ВВЕДИ ЧУЖОЙ КОД</div>
            <input type="text" id="recoveryInput" class="recovery-input" placeholder="001002003005" autocomplete="off">
            <div class="recovery-buttons">
                <button id="recoveryConfirm" class="confirm-btn">ВОССТАНОВИТЬ</button>
                <button id="recoveryCancel" class="cancel-btn">ОТМЕНА</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('generatedCode').onclick = () => {
        const code = document.getElementById('generatedCode').innerText;
        copyToClipboard(code);
    };
    
    document.getElementById('recoveryConfirm').onclick = () => {
        const inputCode = document.getElementById('recoveryInput').value.trim();
        if (inputCode) {
            processRecoveryCode(inputCode);
        }
        modal.remove();
    };
    document.getElementById('recoveryCancel').onclick = () => modal.remove();
}

function processRecoveryCode(code) {
    const triplets = [];
    for (let i = 0; i < code.length; i += 3) {
        const triplet = code.substring(i, i + 3);
        if (triplet.length === 3 && /^\d+$/.test(triplet)) {
            triplets.push(triplet);
        }
    }
    
    if (triplets.length === 0) return;
    
    for (const num of triplets) {
        const foundIndex = availableNicks.findIndex(item => item.num === num);
        if (foundIndex !== -1) {
            const recovered = availableNicks[foundIndex];
            availableNicks.splice(foundIndex, 1);
            usedNicks.push(recovered);
        }
    }
    
    updateUI();
    
    if (waitingForDone && currentNickObj && usedNicks.includes(currentNickObj)) {
        waitingForDone = false;
        currentNickObj = null;
        document.getElementById('nickDisplay').innerText = "—";
    }
}

async function onRandomNick() {
    if (!sessionActive) return;
    if (availableNicks.length === 0) return;
    if (waitingForDone) return;
    
    const idx = Math.floor(Math.random() * availableNicks.length);
    currentNickObj = availableNicks[idx];
    document.getElementById('nickDisplay').innerText = currentNickObj.nick;
    await copyToClipboard(currentNickObj.nick);
    waitingForDone = true;
}

async function onPasswordClick() {
    if (!sessionActive) return;
    if (userPassword) {
        await copyToClipboard(userPassword);
    }
}

function onOpenTrack() {
    if (!sessionActive || !trackUrl) return;
    openInBrowser(trackUrl);
}

function onDone() {
    if (!waitingForDone || !currentNickObj) return;
    
    openInBrowser("https://soundcloud.com/logout");
    
    const idx = availableNicks.findIndex(item => item.num === currentNickObj.num);
    if (idx !== -1) {
        availableNicks.splice(idx, 1);
        usedNicks.push(currentNickObj);
    }
    
    waitingForDone = false;
    updateUI();
    document.getElementById('nickDisplay').innerText = "—";
    currentNickObj = null;
}

function resetSession() {
    sessionActive = false;
    waitingForDone = false;
    currentNickObj = null;
    availableNicks = [...NICKS_WITH_NUMBERS];
    usedNicks = [];
    trackUrl = "";
    userPassword = "";
    document.getElementById('mainPanel').style.display = "none";
    document.getElementById('setupPanel').style.display = "block";
    document.getElementById('trackUrl').value = "";
    document.getElementById('passwordInput').value = "";
}

function startSession() {
    const url = document.getElementById('trackUrl').value.trim();
    const pwd = document.getElementById('passwordInput').value.trim();
    
    if (!url || !url.includes('soundcloud.com')) return;
    if (!pwd) return;
    
    trackUrl = url;
    userPassword = pwd;
    sessionActive = true;
    
    document.getElementById('setupPanel').style.display = "none";
    document.getElementById('mainPanel').style.display = "block";
    document.getElementById('passwordDisplay').innerText = "•".repeat(Math.min(pwd.length, 12));
    
    availableNicks = [...NICKS_WITH_NUMBERS];
    usedNicks = [];
    currentNickObj = null;
    waitingForDone = false;
    document.getElementById('nickDisplay').innerText = "—";
    updateUI();
}

document.getElementById('startBtn').onclick = startSession;
document.getElementById('randomBtn').onclick = onRandomNick;
document.getElementById('trackBtn').onclick = onOpenTrack;
document.getElementById('doneBtn').onclick = onDone;
document.getElementById('resetBtn').onclick = resetSession;
document.getElementById('passwordDisplay').onclick = onPasswordClick;
document.getElementById('recoveryBtn').onclick = showRecoveryModal;
</script>
</body>
</html>
