<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SoundCloud лайкер</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, Arial, sans-serif;
            padding: 12px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .track-area {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        input, button {
            font-size: 18px;
            padding: 14px 18px;
        }
        #trackUrl {
            width: 100%;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 16px;
        }
        #passwordInput {
            width: 100%;
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 14px;
            margin-bottom: 12px;
            font-size: 16px;
        }
        #startBtn {
            width: 100%;
            background: #ff5500;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            padding: 16px;
        }
        .main-panel {
            background: #0f0f0f;
            border-radius: 24px;
            padding: 20px;
        }
        .big-btn {
            width: 100%;
            padding: 28px 16px;
            font-size: 26px;
            background: #ff5500;
            border-radius: 60px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .info-bar {
            background: #1a1a1a;
            padding: 14px;
            border-radius: 16px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        .nick-box, .pass-box {
            background: #222;
            padding: 18px 12px;
            text-align: center;
            font-size: 24px;
            font-family: monospace;
            border-radius: 16px;
            margin: 12px 0;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.1s;
            word-break: break-all;
        }
        .nick-box {
            color: #ffaa44;
            background: #2a1a0a;
            border: 1px solid #ffaa44;
        }
        .pass-box {
            color: #88aaff;
            background: #0a1a2a;
            border: 1px solid #88aaff;
            font-size: 22px;
        }
        .nick-box:active, .pass-box:active {
            transform: scale(0.98);
            background: #333;
        }
        .track-btn {
            width: 100%;
            padding: 16px;
            font-size: 20px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            margin: 12px 0;
        }
        .used-btn, .reset-btn {
            padding: 14px 20px;
            font-size: 18px;
            margin: 5px;
            border-radius: 40px;
            flex: 1;
        }
        .used-btn {
            background: #cc0000;
        }
        .reset-btn {
            background: #333;
        }
        .status {
            background: #1a4d1a;
            color: #aaffaa;
            padding: 14px;
            text-align: center;
            border-radius: 14px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.4;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
        }
        .instruction {
            color: #888;
            font-size: 13px;
            text-align: center;
            margin: 12px 0;
            background: #111;
            padding: 10px;
            border-radius: 12px;
        }
        button {
            cursor: pointer;
            border: none;
        }
        button:active {
            transform: scale(0.97);
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a4d1a;
            color: #aaffaa;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 1000;
            white-space: nowrap;
            box-shadow: 0 4px 12px black;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="setupPanel" class="track-area">
        <input type="text" id="trackUrl" placeholder="https://soundcloud.com/.../трек">
        <input type="password" id="passwordInput" placeholder="Пароль от аккаунтов">
        <button id="startBtn">▶ СТАРТ</button>
    </div>

    <div id="mainPanel" style="display: none;">
        <div class="main-panel">
            <button id="randomBtn" class="big-btn">🎲 СЛУЧАЙНЫЙ НИК</button>
            
            <div class="nick-box" id="nickDisplay">—</div>
            <div class="pass-box" id="passwordDisplay">••••••••</div>
            
            <button id="trackBtn" class="track-btn">🔗 НА ТРЕК</button>
            
            <div class="info-bar">
                <span>📦 Осталось: <strong id="remainCount">0</strong></span>
                <span>✅ Использовано: <strong id="usedCount">0</strong></span>
            </div>
            
            <div class="flex-buttons">
                <button id="doneBtn" class="used-btn">✓ ВЫПОЛНИЛ</button>
                <button id="resetBtn" class="reset-btn">⟳ СБРОС</button>
            </div>
            
            <div id="statusMsg" class="status">⚡ Готов к работе</div>
            <div class="instruction">
                📱 Нажми на ник или пароль → скопируется<br>
                🔁 После лайка нажми ВЫПОЛНИЛ
            </div>
        </div>
    </div>
</div>

<script>
const ALL_NICKS = [
    "17enttt","tanos-624602436","st0kkman","fatmandygng","prod-mandy",
    "flewed-532745435","erdmankry","reallyrich2k26","jellynest-5","totrapmusicbuth",
    "fendy1s","smokingdaver","dorbaby","pamdtuk","yngbom","rocckset","smalepoint",
    "prso-unablor","jitqwipper","ven2kk","damfold","crowded3","proddebut","wildkant",
    "vorqqkk","barb-514332249","30mop","2realslime","b0ximgg","filgenius",
    "fantoss-483481720","slabboyst","troddennn","laseddev","willswowtfk","satmorphine",
    "drewnnnnn","fakedunkk","oxxshnta","gelandoke","2amboy","anofenkk","paurinup",
    "lendray88","supdaily","banddetro72","damncoldy","buddygrol9","strikeqq","flayzed",
    "jugg2mandy","thekr9ueger","sameder-samderrs","jaystkraylaa","c2razyy","miketlorisss",
    "kastlook9277","drango-426649390","hamzadoll","ski-dl","tomymontanaaaaaa","wtfdinny71",
    "bj3agly","2mandys3","toorealslimking","whyyalwaysmeee","2sad2care-205405600",
    "dudeneatsssssss","whot891","mdmoodl"
];

let available = [...ALL_NICKS];
let used = [];
let currentNick = null;
let trackUrl = "";
let userPassword = "";
let sessionActive = false;
let waitingForDone = false;

function showToast(msg, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = msg;
    toast.style.background = isError ? '#4a1a1a' : '#1a4d1a';
    toast.style.color = isError ? '#ffaaaa' : '#aaffaa';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function updateUI() {
    document.getElementById('remainCount').innerText = available.length;
    document.getElementById('usedCount').innerText = used.length;
}

function setStatus(text, isError = false) {
    const statusDiv = document.getElementById('statusMsg');
    statusDiv.innerHTML = text;
    statusDiv.style.background = isError ? '#4a1a1a' : '#1a4d1a';
}

async function copyToClipboard(text, successMsg) {
    try {
        await navigator.clipboard.writeText(text);
        showToast(successMsg);
    } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(successMsg);
    }
}

// ========== ГЛАВНОЕ: открываем в браузере, НЕ в приложении ==========
function openInBrowser(url) {
    // Пробуем через window.open с дополнительными параметрами
    const win = window.open(url, '_blank', 'noopener,noreferrer');
    if (!win) {
        // fallback
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
}

async function onRandomNick() {
    if (!sessionActive) {
        setStatus("Сначала нажми СТАРТ", true);
        return;
    }
    if (available.length === 0) {
        setStatus("Все ники использованы! Нажми СБРОС", true);
        return;
    }
    if (waitingForDone) {
        setStatus("Сначала нажми ВЫПОЛНИЛ", true);
        return;
    }
    
    const idx = Math.floor(Math.random() * available.length);
    currentNick = available[idx];
    document.getElementById('nickDisplay').innerText = currentNick;
    await copyToClipboard(currentNick, `✅ Ник скопирован`);
    setStatus(`Ник "${currentNick}" скопирован`);
    waitingForDone = true;
}

async function onPasswordClick() {
    if (!sessionActive) return setStatus("Сначала нажми СТАРТ", true);
    if (userPassword) {
        await copyToClipboard(userPassword, `🔐 Пароль скопирован`);
        setStatus("Пароль скопирован");
    }
}

function onOpenTrack() {
    if (!sessionActive || !trackUrl) return setStatus("Сначала нажми СТАРТ", true);
    openInBrowser(trackUrl);
    setStatus("🔗 Трек открыт в браузере! Поставь лайк");
}

function onDone() {
    if (!waitingForDone || !currentNick) return setStatus("Сначала нажми СЛУЧАЙНЫЙ НИК", true);
    
    openInBrowser("https://soundcloud.com/logout");
    
    const idx = available.indexOf(currentNick);
    if (idx !== -1) {
        available.splice(idx, 1);
        used.push(currentNick);
    }
    
    waitingForDone = false;
    updateUI();
    document.getElementById('nickDisplay').innerText = "—";
    setStatus(`Готов! ${currentNick} отмечен`);
    showToast(`✅ ${currentNick} использован`);
    currentNick = null;
}

function resetSession() {
    sessionActive = false;
    waitingForDone = false;
    currentNick = null;
    available = [...ALL_NICKS];
    used = [];
    trackUrl = "";
    userPassword = "";
    document.getElementById('mainPanel').style.display = "none";
    document.getElementById('setupPanel').style.display = "block";
    document.getElementById('trackUrl').value = "";
    document.getElementById('passwordInput').value = "";
    setStatus("Сессия сброшена");
}

function startSession() {
    const url = document.getElementById('trackUrl').value.trim();
    const pwd = document.getElementById('passwordInput').value.trim();
    
    if (!url || !url.includes('soundcloud.com')) return setStatus("Введи ссылку на трек", true);
    if (!pwd) return setStatus("Введи пароль", true);
    
    trackUrl = url;
    userPassword = pwd;
    sessionActive = true;
    
    document.getElementById('setupPanel').style.display = "none";
    document.getElementById('mainPanel').style.display = "block";
    document.getElementById('passwordDisplay').innerText = "•".repeat(Math.min(pwd.length, 12));
    
    available = [...ALL_NICKS];
    used = [];
    currentNick = null;
    waitingForDone = false;
    document.getElementById('nickDisplay').innerText = "—";
    updateUI();
    setStatus("Сессия начата! Жми СЛУЧАЙНЫЙ НИК");
}

// Обработчики
document.getElementById('startBtn').onclick = startSession;
document.getElementById('randomBtn').onclick = onRandomNick;
document.getElementById('trackBtn').onclick = onOpenTrack;
document.getElementById('doneBtn').onclick = onDone;
document.getElementById('resetBtn').onclick = resetSession;
document.getElementById('passwordDisplay').onclick = onPasswordClick;
</script>
</body>
</html>
